services:

  # ── MySQL ──────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD}"
      MYSQL_DATABASE: "${DB_DATABASE}"
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"   # 3307 so it doesn't clash with your local MySQL
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Laravel App (PHP-FPM) ──────────────────────────────────────────────────
  app:
    build:
      context: ./intelligent-recruiter-laravel
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./intelligent-recruiter-laravel:/var/www/html
    env_file:
      - ./intelligent-recruiter-laravel/.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      PYTHON_AI_URL: http://python:8001
    depends_on:
      mysql:
        condition: service_healthy

  # ── Nginx ──────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./intelligent-recruiter-laravel:/var/www/html
      - ./intelligent-recruiter-laravel/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  # ── Queue Worker ───────────────────────────────────────────────────────────
  queue:
    build:
      context: ./intelligent-recruiter-laravel
      dockerfile: Dockerfile
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --sleep=3
    volumes:
      - ./intelligent-recruiter-laravel:/var/www/html
    env_file:
      - ./intelligent-recruiter-laravel/.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      PYTHON_AI_URL: http://python:8001
    depends_on:
      mysql:
        condition: service_healthy

  # ── Python AI Service ──────────────────────────────────────────────────────
  python:
    build:
      context: ./intelligent-recruiter-ai
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - ./intelligent-recruiter-ai/.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306

volumes:
  mysql_data:
